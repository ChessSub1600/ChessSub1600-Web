<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tablero de prueba</title>

  <!-- Estilo básico del tablero -->
  <link rel="stylesheet" href="assets/css/tablero.css">

  <!-- Motor lógico chess.js -->
  <script src="assets/js/chess.js"></script>
</head>
<body>

  <h2 style="text-align:center">🧪 Test de Tablero Interactivo</h2>

  <div id="tablero" class="custom-board"></div>

  <!-- Script del tablero -->
  <script src="assets/js/tablero.js"></script>
  <script type="module">
  import { Chess } from './assets/js/chess.js';

  const piezaEmoji = {
    p: '♟️', r: '♜', n: '♞', b: '♝', q: '♛', k: '♚',
    P: '♙', R: '♖', N: '♘', B: '♗', Q: '♕', K: '♔'
  };

  const game = new Chess();
  const tablero = document.getElementById('tablero');
  const files = ['a','b','c','d','e','f','g','h'];
  let selectedSquare = null;

  for (let rank = 8; rank >= 1; rank--) {
    for (let i = 0; i < files.length; i++) {
      const squareId = files[i] + rank;
      const square = document.createElement('div');
      square.classList.add('square');
      square.classList.add((rank + i) % 2 === 0 ? 'white' : 'black');
      square.setAttribute('data-square', squareId);
      square.innerText = '';
      square.addEventListener('click', () => handleClick(squareId));
      tablero.appendChild(square);
    }
  }

  function handleClick(squareId) {
    if (!selectedSquare) {
      selectedSquare = squareId;
      highlight(squareId);
    } else {
      game.move({ from: selectedSquare, to: squareId, promotion: 'q' });
      renderBoard();
      clearHighlight();
      selectedSquare = null;
    }
  }

  function highlight(squareId) {
    document.querySelector(`[data-square="${squareId}"]`)
      .style.boxShadow = 'inset 0 0 5px 3px yellow';
  }

  function clearHighlight() {
    document.querySelectorAll('.square').forEach(sq => (sq.style.boxShadow = ''));
  }

  function renderBoard() {
    const squares = document.querySelectorAll('.square');
    squares.forEach(sq => (sq.innerText = ''));

    const fen = game.fen().split(' ')[0];
    const ranks = fen.split('/');

    let index = 0;
    ranks.forEach(rank => {
      for (const char of rank) {
        if (isNaN(char)) {
          const square = squares[index];
          square.innerText = piezaEmoji[char] || '';
          index++;
        } else {
          index += parseInt(char);
        }
      }
    });
  }

  renderBoard();
</script>


</body>
</html>
